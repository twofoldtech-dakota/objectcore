name: release

# Stage 2 release pipeline. Mirrors the Changesets flow but versions PLUGINS
# (plugin.json), not npm packages:
#   - changesets present  -> run release:version, open/update the "Version PR"
#   - changesets consumed  -> run release:publish (tag {plugin}--v{semver} + SHA-pin),
#                             push tags, and attest the pinned catalog (SLSA provenance)
on:
  push:
    branches: [main]

concurrency: release-${{ github.ref }}

permissions:
  contents: write # create tags / the Version PR branch
  pull-requests: write # open the Version PR
  id-token: write # OIDC for attestation
  attestations: write # actions/attest-build-provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history + tags so release:publish can see existing tags

      # release:publish creates annotated tags (`git tag -a`), which need an identity.
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install (frozen lockfile)
        run: bun install --frozen-lockfile

      # Gate before any release action — never release an un-validated catalog,
      # a drifted knowledge INDEX, or a failing design-token set.
      - name: Validate catalog + KB + design
        run: bun run check:catalog && bun run kb:check && bun run design:check

      - name: Contract tests
        run: bun test

      # Are there pending changesets (excluding README)?
      - name: Detect changesets
        id: detect
        run: |
          shopt -s nullglob
          count=0
          for f in .changeset/*.md; do
            [ "$(basename "$f" | tr '[:upper:]' '[:lower:]')" = "readme.md" ] && continue
            count=$((count+1))
          done
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Found $count changeset(s)."

      # --- Changesets present: produce the Version PR ---
      - name: Version plugins
        if: steps.detect.outputs.count != '0'
        run: bun run release:version

      # Run the FULL gate on the versioned tree inside this job: a PR created with the
      # default GITHUB_TOKEN never triggers ci.yml (a documented GitHub limitation), so
      # without this step the version commit would merge ungated. This catches
      # expectEntry.version lockstep drift and derivation bugs before the PR opens.
      # (Without an ANTHROPIC_API_KEY the judged evals report as skipped — CI-safe.)
      - name: Post-version gate (bun run check)
        if: steps.detect.outputs.count != '0'
        run: bun run check
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      # checkout@v7 persists its token as an http.extraheader inside an EXTERNAL config
      # file wired in via includeIf.gitdir — a value a plain `--local --unset-all
      # http....extraheader` cannot reach (that was the first, failed fix). At request
      # time git resolves BOTH that included header and the one create-pull-request
      # configures, sends two Authorization headers, and GitHub rejects the request
      # (400 `Duplicate header: "Authorization"`). Strip the includeIf wiring — safe
      # here because the version leg and the tag-pushing publish leg are mutually
      # exclusive (steps.detect), so nothing after this step uses checkout's credential.
      - name: Drop checkout's persisted credential (avoid duplicate Authorization header)
        if: steps.detect.outputs.count != '0'
        run: |
          (git config --local --name-only --get-regexp '^includeIf\.' || true) | sort -u | \
            while read -r key; do git config --local --unset-all "$key"; done
          git config --local --unset-all http.https://github.com/.extraheader || true
          echo "remaining extraheader values (want: none):"
          git config --get-all http.https://github.com/.extraheader || true

      # RELEASE_PAT (a fine-grained PAT or GitHub App token with contents +
      # pull-requests write) makes ci.yml actually run on the Version PR — refs created
      # by the default GITHUB_TOKEN fire no workflows. Inert until the secret is set
      # (the `|| github.token` fallback matches the FLY_API_TOKEN arming pattern); the
      # Post-version gate above keeps the PR gated either way.
      - name: Open/update Version PR
        if: steps.detect.outputs.count != '0'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.RELEASE_PAT || github.token }}
          branch: changeset-release/main
          title: "Release: version plugins"
          commit-message: "chore: version plugins (consume changesets)"
          body: |
            Automated by the ObjectCore release workflow.

            Merging this PR consumes the pending changesets: it bumps each plugin's
            `plugin.json` version, keeps `evals/output.json` in lockstep, updates the
            per-plugin `CHANGELOG.md`, and re-derives `.claude-plugin/marketplace.json`
            through the single `deriveCatalog` seam.

            On merge (no changesets left) this workflow tags `{plugin}--v{semver}`,
            SHA-pins the catalog to the release commit (`git-subdir` sources), and
            attests the pinned catalog with build provenance.

      # --- No changesets: tag + SHA-pin + attest ---
      # Eval-gate the publish leg too: ci.yml runs on the same push but in parallel —
      # it never blocks this job. Offline (keyless) this still runs the
      # output/coverage/readiness layers, which catch expectEntry.version lockstep
      # drift before anything is tagged, pinned, or attested.
      - name: Pre-publish eval gate
        if: steps.detect.outputs.count == '0'
        run: bun run eval
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Publish (tag + SHA-pin)
        if: steps.detect.outputs.count == '0'
        id: publish
        run: bun run release:publish
        env:
          # We attest the artifact in the next step; assert intent so the provenance
          # gate (MCP-bundling plugins must be attested) lets the publish proceed.
          OBJECTCORE_ATTESTED: "1"

      # Push ONLY the tags this run created (release:publish hands them over via
      # GITHUB_OUTPUT) — `--tags` would also push any stray local tag.
      - name: Push new tags
        if: steps.detect.outputs.count == '0' && steps.publish.outputs.tag_count != '0'
        run: git push origin ${{ steps.publish.outputs.tags }}

      - name: Attest pinned catalog (build provenance)
        if: steps.detect.outputs.count == '0' && hashFiles('dist/marketplace.pinned.json') != ''
        id: attest
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/marketplace.pinned.json

      - name: Upload pinned catalog
        if: steps.detect.outputs.count == '0' && hashFiles('dist/marketplace.pinned.json') != ''
        uses: actions/upload-artifact@v7
        with:
          name: marketplace-pinned
          path: dist/marketplace.pinned.json

      # Stage 3: publish the released catalog to the live backend over OIDC (plan 011) —
      # the SINGLE publish path. It dogfoods POST /v1/plugins exactly as an external
      # publisher would: no DATABASE_URL, only id-token: write. The CLI mints a token
      # scoped to OBJECTCORE_OIDC_AUDIENCE and posts each plugin; the route verifies it,
      # re-enforces the provenance gate, and writes through the CatalogStore.
      # (The direct `bun run registry:ingest` path remains available as manual break-glass
      # if the backend is ever unreachable during a release — DATABASE_URL + TURSO_AUTH_TOKEN.)
      # Guarded by OBJECTCORE_REGISTRY_URL so a deliberate disarm is possible.
      - name: Publish to the registry over OIDC (POST /v1/plugins)
        if: steps.detect.outputs.count == '0' && hashFiles('dist/marketplace.pinned.json') != '' && vars.OBJECTCORE_REGISTRY_URL != ''
        run: bun run registry:publish
        env:
          OBJECTCORE_REGISTRY_URL: ${{ vars.OBJECTCORE_REGISTRY_URL }}
          OBJECTCORE_OIDC_AUDIENCE: ${{ vars.OBJECTCORE_OIDC_AUDIENCE }}
          OBJECTCORE_ATTESTED: "1"
          OBJECTCORE_PROVENANCE_URL: ${{ steps.attest.outputs.attestation-url }}
