name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # The Bun runtime is pinned (.bun-version) like everything else we ship — a bad
      # Bun release becomes a one-file upgrade PR that runs the full gate, not a
      # simultaneous break of CI, releases, and deploys.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install (frozen lockfile)
        run: bun install --frozen-lockfile

      # The gate is a SINGLE command so its composition stays single-sourced in
      # package.json's `check` script (tsc + check:catalog + kb:check + design:check +
      # test + eval) and can never drift from what contributors run locally.
      # Output/coverage/readiness evals always run. Activation/delegation evals (the
      # trigger-surface gate) run only when an ANTHROPIC_API_KEY secret is configured;
      # otherwise they are reported as skipped and the job stays green. Add the secret
      # to enforce the activation half of the gate.
      - name: The gate (bun run check)
        run: bun run check
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
