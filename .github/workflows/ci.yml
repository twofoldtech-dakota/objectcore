name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc

      # The catalog gate: every plugin valid + marketplace.json in sync (not hand-edited).
      - name: Validate catalog
        run: bun run check:catalog

      - name: Contract tests
        run: bun test

      # Output evals always run. Activation evals (the trigger-surface gate) run only
      # when an ANTHROPIC_API_KEY secret is configured; otherwise they are reported as
      # skipped and the job stays green. Add the secret to enforce the activation gate.
      - name: Eval gate
        run: bun run eval
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
